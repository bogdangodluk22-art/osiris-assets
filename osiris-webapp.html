<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<style>
:root {
  --os-navy:       #0d1b2e;
  --os-gold:       #c9a84c;
  --os-gold-light: #e8c96a;
  --os-blue:       #2a6fff;
  --os-bg:         rgba(4, 8, 15, 0.95);
}

#osiris-widget {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 99999;
  font-family: 'Courier New', monospace;
  user-select: none;
  display: flex;
  align-items: flex-end;
}

/* ── CHAT (зліва) ── */
#osiris-chat {
  width: 340px;
  background: var(--os-bg);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 20px;
  overflow: hidden;
  display: none;
  flex-direction: column;
  max-height: 480px;
  backdrop-filter: blur(20px);
  margin-right: 12px;
  box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 20px rgba(201,168,76,0.08);
}
#osiris-chat.visible {
  display: flex;
  animation: osChatReveal 0.4s cubic-bezier(0.16,1,0.3,1);
}
@keyframes osChatReveal {
  from { opacity:0; transform:translateX(20px) scale(0.96); }
  to   { opacity:1; transform:translateX(0) scale(1); }
}
#osiris-chat-header {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(201,168,76,0.15);
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
#osiris-chat-header span {
  font-size: 9px; letter-spacing: 2px;
  color: var(--os-gold); opacity: 0.7; text-transform: uppercase;
}
.os-dot {
  width:6px; height:6px; border-radius:50%;
  background: var(--os-gold); animation: osPulse 2s infinite; flex-shrink:0;
}
@keyframes osPulse {
  0%,100% { opacity:1; box-shadow:0 0 4px var(--os-gold); }
  50%     { opacity:0.4; box-shadow:none; }
}
#osiris-messages {
  flex:1; overflow-y:auto; padding:14px 16px;
  display:flex; flex-direction:column; gap:10px;
  scrollbar-width:thin; scrollbar-color:rgba(201,168,76,0.2) transparent;
  min-height:120px; max-height:340px;
}
.os-msg {
  max-width:85%; padding:8px 12px; border-radius:12px;
  font-size:12px; line-height:1.5; animation:osMsgIn 0.25s ease;
}
@keyframes osMsgIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
.os-msg.user {
  align-self:flex-end;
  background:rgba(201,168,76,0.12); border:1px solid rgba(201,168,76,0.25); color:#e8d5a3;
}
.os-msg.bot {
  align-self:flex-start;
  background:rgba(13,27,46,0.8); border:1px solid rgba(42,111,255,0.2); color:#a8c4e8;
}
.os-msg.typing { color:rgba(168,196,232,0.5); font-style:italic; }
#osiris-input-row {
  padding:10px 12px; border-top:1px solid rgba(201,168,76,0.1);
  display:flex; gap:8px; align-items:center; flex-shrink:0;
}
#osiris-input {
  flex:1; background:rgba(255,255,255,0.04);
  border:1px solid rgba(201,168,76,0.2); border-radius:10px;
  padding:8px 12px; color:#e8d5a3;
  font-family:'Courier New',monospace; font-size:11px; outline:none;
  transition:border-color 0.2s;
}
#osiris-input:focus { border-color:rgba(201,168,76,0.5); }
#osiris-input::placeholder { color:rgba(201,168,76,0.3); }
#osiris-send-btn {
  width:34px; height:34px; border-radius:10px;
  background:var(--os-gold); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; flex-shrink:0;
}
#osiris-send-btn:hover { background:var(--os-gold-light); box-shadow:0 0 12px rgba(201,168,76,0.5); }
#osiris-send-btn svg { width:16px; height:16px; fill:var(--os-navy); }

/* ── ROBOT COLUMN ── */
#osiris-robot-col { display:flex; flex-direction:column; align-items:center; }

#osiris-panel { display:none; flex-direction:column; align-items:center; }
#osiris-panel.visible {
  display:flex;
  animation:osReveal 0.4s cubic-bezier(0.16,1,0.3,1);
}
@keyframes osReveal {
  from { opacity:0; transform:translateY(16px) scale(0.95); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

#osiris-viewport-wrap { width:340px; height:380px; position:relative; }
#osiris-canvas {
  position:absolute; inset:0;
  width:100% !important; height:100% !important;
  border-radius:20px 20px 0 0; background:transparent;
}
#osiris-status {
  position:absolute; top:14px; right:14px;
  font-size:9px; letter-spacing:2px; color:var(--os-gold);
  opacity:0.6; text-transform:uppercase; pointer-events:none;
}
#osiris-loading {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:10px;
  border-radius:20px 20px 0 0;
  background:rgba(4,8,15,0.85);
  pointer-events:none; transition:opacity 0.5s;
}
#osiris-loading.hidden { opacity:0; }
.os-loader-ring {
  width:36px; height:36px;
  border:2px solid rgba(201,168,76,0.15); border-top-color:var(--os-gold);
  border-radius:50%; animation:osRing 0.8s linear infinite;
}
@keyframes osRing { to { transform:rotate(360deg); } }
.os-loader-text { font-size:8px; letter-spacing:3px; color:rgba(201,168,76,0.5); text-transform:uppercase; }

#osiris-toggle-btn {
  width:340px; background:var(--os-navy);
  border:1.5px solid var(--os-gold); border-top:none;
  color:var(--os-gold); font-family:'Courier New',monospace;
  font-size:10px; letter-spacing:2px; padding:8px 18px;
  border-radius:0 0 16px 16px; cursor:pointer;
  transition:all 0.3s; box-shadow:0 0 12px rgba(201,168,76,0.15); text-align:center;
}
#osiris-toggle-btn:hover {
  background:rgba(201,168,76,0.1); box-shadow:0 0 20px rgba(201,168,76,0.35); color:var(--os-gold-light);
}
#osiris-toggle-btn.active {
  background:rgba(201,168,76,0.12); color:var(--os-gold-light);
  border-color:var(--os-gold-light); box-shadow:0 0 20px rgba(201,168,76,0.4);
}
.os-ind {
  display:inline-block; width:7px; height:7px; border-radius:50%;
  background:#3bff7a; margin-right:6px; vertical-align:middle;
  box-shadow:0 0 6px #3bff7a; transition:all 0.3s;
}
.os-ind.on { background:#ff3b3b; box-shadow:0 0 8px #ff3b3b; }

#osiris-logo-btn {
  width:58px; height:58px; border-radius:14px;
  background:var(--os-navy); border:1.5px solid var(--os-gold);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.3s; margin-top:8px; align-self:flex-end;
  box-shadow:0 0 20px rgba(201,168,76,0.2), 0 4px 24px rgba(0,0,0,0.6);
}
#osiris-logo-btn:hover {
  box-shadow:0 0 30px rgba(201,168,76,0.45), 0 4px 24px rgba(0,0,0,0.6);
  border-color:var(--os-gold-light); transform:scale(1.05);
}
#osiris-logo-btn svg { width:36px; height:36px; }
</style>

<div id="osiris-widget">
  <div id="osiris-chat">
    <div id="osiris-chat-header">
      <div class="os-dot"></div>
      <span>OSIRIS AI · READY</span>
    </div>
    <div id="osiris-messages"></div>
    <div id="osiris-input-row">
      <input id="osiris-input" type="text" placeholder="Введи запит...">
      <button id="osiris-send-btn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

  <div id="osiris-robot-col">
    <div id="osiris-panel">
      <div id="osiris-viewport-wrap">
        <canvas id="osiris-canvas"></canvas>
        <div id="osiris-status">OSIRIS · ONLINE</div>
        <div id="osiris-loading">
          <div class="os-loader-ring"></div>
          <div class="os-loader-text">INITIALIZING</div>
        </div>
      </div>
      <button id="osiris-toggle-btn"><span class="os-ind"></span>ACTIVATE</button>
    </div>
    <div id="osiris-logo-btn">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="osGold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e8c96a"/>
            <stop offset="100%" stop-color="#c9a84c"/>
          </linearGradient>
        </defs>
        <text x="3" y="32" font-family="Georgia,serif" font-size="26" font-weight="700"
              fill="url(#osGold)" letter-spacing="-1">OS</text>
        <line x1="3" y1="36" x2="45" y2="36" stroke="url(#osGold)" stroke-width="1" opacity="0.5"/>
      </svg>
    </div>
  </div>
</div>

<script>
(function () {
  var WEBHOOK_URL = 'https://n8n.srv1421181.hstgr.cloud/webhook/osiris';

  // Унікальний ID сесії — зберігається в localStorage
  var userId = localStorage.getItem('osiris_user_id');
  if (!userId) {
    userId = 'site_' + Math.random().toString(36).substr(2, 12) + '_' + Date.now();
    localStorage.setItem('osiris_user_id', userId);
  }

  var GLB = {
    base:      'https://raw.githubusercontent.com/bogdangodluk22-art/osiris/main/Meshy_AI_Osiris_Robot.glb',
    breathing: 'https://raw.githubusercontent.com/bogdangodluk22-art/osiris/main/Breathing%20Robot.glb',
    touch:     'https://raw.githubusercontent.com/bogdangodluk22-art/osiris/main/touchscreen%20robot.glb'
  };

  var panelOpen  = false;
  var chatActive = false;
  var isTyping   = false;

  var engine     = null;
  var bbScene    = null;
  var cache      = {};
  var activeKey  = null;
  var activeAnim = null;
  var spinOn     = false;
  var spinAngle  = 0;
  var spinRoot   = null;

  var logoBtn    = document.getElementById('osiris-logo-btn');
  var panel      = document.getElementById('osiris-panel');
  var toggleBtn  = document.getElementById('osiris-toggle-btn');
  var chat       = document.getElementById('osiris-chat');
  var messagesEl = document.getElementById('osiris-messages');
  var inputEl    = document.getElementById('osiris-input');
  var sendBtn    = document.getElementById('osiris-send-btn');
  var canvasEl   = document.getElementById('osiris-canvas');
  var loadingEl  = document.getElementById('osiris-loading');

  // ─── INIT BABYLON ────────────────────────────────────────────────────────
  function initBabylon() {
    engine  = new BABYLON.Engine(canvasEl, true, { alpha: true, preserveDrawingBuffer: true });
    engine.setHardwareScalingLevel(1 / window.devicePixelRatio);

    bbScene = new BABYLON.Scene(engine);
    bbScene.clearColor = new BABYLON.Color4(0, 0, 0, 0);

    // Tone mapping + exposure — вмикає яскраві PBR-метали
    var ip = bbScene.imageProcessingConfiguration;
    ip.toneMappingEnabled = true;
    ip.toneMappingType    = BABYLON.ImageProcessingConfiguration.TONEMAPPING_ACES;
    ip.exposure           = 1.8;
    ip.contrast           = 1.15;

    // Камера: фронт (alpha=-PI/2), горизонталь (beta=PI/2), дистанція 3
    var camera = new BABYLON.ArcRotateCamera('cam', -Math.PI/2, Math.PI/2, 3.0,
      new BABYLON.Vector3(0, 0.8, 0), bbScene);
    camera.lowerRadiusLimit = camera.upperRadiusLimit = 3.0;
    camera.lowerBetaLimit   = camera.upperBetaLimit   = Math.PI / 2;
    camera.inputs.clear();

    // Hemispheric — загальне м'яке біле світло
    var amb = new BABYLON.HemisphericLight('amb', new BABYLON.Vector3(0,1,0), bbScene);
    amb.intensity   = 1.2;
    amb.diffuse     = new BABYLON.Color3(1, 1, 1);
    amb.groundColor = new BABYLON.Color3(0.05, 0.1, 0.25);

    // Directional — тепле золоте зверху-збоку (основне)
    var dMain = new BABYLON.DirectionalLight('dMain', new BABYLON.Vector3(1,-2,-1), bbScene);
    dMain.diffuse   = new BABYLON.Color3(1.0, 0.88, 0.55);
    dMain.intensity = 3.0;

    // Directional — синій холодний rim ззаду
    var dRim = new BABYLON.DirectionalLight('dRim', new BABYLON.Vector3(-1,-0.3,1.5), bbScene);
    dRim.diffuse   = new BABYLON.Color3(0.25, 0.55, 1.0);
    dRim.intensity = 2.2;

    // Point — синій ореол зліва (як у Three.js blueLight)
    var pBlue = new BABYLON.PointLight('pBlue', new BABYLON.Vector3(-2,1.2,1), bbScene);
    pBlue.diffuse   = new BABYLON.Color3(0.2, 0.5, 1.0);
    pBlue.intensity = 3.0;
    pBlue.range     = 8;

    // Point — золотий знизу-спереду (блиск металу)
    var pGold = new BABYLON.PointLight('pGold', new BABYLON.Vector3(0.3,-0.3,2.0), bbScene);
    pGold.diffuse   = new BABYLON.Color3(1.0, 0.85, 0.4);
    pGold.intensity = 2.0;
    pGold.range     = 5;

    engine.runRenderLoop(function() {
      if (spinOn && spinRoot) {
        spinAngle += 0.008;
        spinRoot.rotation.y = spinAngle;
      }
      bbScene.render();
    });

    window.addEventListener('resize', function() { engine.resize(); });
  }

  // baseY зберігаємо після першого завантаження base-моделі
  var baseY = null;

  // ─── LOAD + SHOW MODEL ───────────────────────────────────────────────────
  function showModel(key) {
    if (cache[key]) { activate(key); return; }

    BABYLON.SceneLoader.ImportMesh('', GLB[key], '', bbScene,
      function(meshes, _p, _s, animGroups) {
        var root = new BABYLON.Mesh('root_' + key, bbScene);
        meshes.forEach(function(m) {
          if (!m.parent) m.setParent(root);
        });

        animGroups.forEach(function(ag) { ag.stop(); });

        setTimeout(function() {
          bbScene.meshes.forEach(function(m) { m.computeWorldMatrix(true); });

          var bb = root.getHierarchyBoundingVectors(true);
          var h  = bb.max.y - bb.min.y;
          var sc = (h > 0.01) ? 1.6 / h : 1.0;
          root.scaling = new BABYLON.Vector3(sc, sc, sc);

          bbScene.meshes.forEach(function(m) { m.computeWorldMatrix(true); });
          bb = root.getHierarchyBoundingVectors(true);

          // Центр по X і Z
          var cx = (bb.max.x + bb.min.x) / 2;
          var cz = (bb.max.z + bb.min.z) / 2;
          root.position.x = -cx;
          root.position.z = -cz;

          // Y: ЖОРСТКА КОНСТАНТА для всіх трьох моделей.
          // Камера: target.y=0.8, radius=3.0, beta=PI/2 (горизонталь).
          // Модель висотою 1.6 повинна стояти ногами на Y=0, голова на Y=1.6.
          // Центр видимості = 0.8 = target камери. Все вирівняно.
          // Кожна GLB має свій offset — підбираємо вручну
          var Y_OFFSET = { 'base': 0.6, 'breathing': -0.2, 'touch': -0.2 };
          root.position.y = Y_OFFSET[key] !== undefined ? Y_OFFSET[key] : 0;

          if (key === 'base') { baseY = root.position.y; }

          cache[key] = { root: root, animGroups: animGroups };
          root.setEnabled(false);
          activate(key);
        }, 80);
      },
      null,
      function(_, msg) { console.warn('GLB [' + key + ']:', msg); }
    );
  }

  function activate(key) {
    if (activeKey && activeKey !== key && cache[activeKey]) {
      cache[activeKey].root.setEnabled(false);
      if (activeAnim) { activeAnim.stop(); activeAnim = null; }
    }
    activeKey = key;
    var e = cache[key];
    e.root.setEnabled(true);
    spinRoot = e.root;

    // Spin ON → кут спіну, Spin OFF → фронт до юзера (PI = 180°)
    e.root.rotation.y = spinOn ? spinAngle : Math.PI;

    activeAnim = e.animGroups.length ? e.animGroups[0] : null;
    if (activeAnim) activeAnim.start(true);
    loadingEl.classList.add('hidden');
  }

  // ─── PANEL TOGGLE ────────────────────────────────────────────────────────
  logoBtn.addEventListener('click', function() {
    panelOpen = !panelOpen;
    if (panelOpen) {
      panel.classList.add('visible');
      if (!engine) initBabylon();
      spinOn = true;
      loadingEl.classList.remove('hidden');
      showModel('base');
    } else {
      panel.classList.remove('visible');
      if (chatActive) deactivate();
    }
  });

  // ─── ACTIVATE / DEACTIVATE ───────────────────────────────────────────────
  toggleBtn.addEventListener('click', function() {
    chatActive ? deactivate() : doActivate();
  });

  function doActivate() {
    chatActive = true;
    spinOn     = false;
    toggleBtn.innerHTML = '<span class="os-ind on"></span>DEACTIVATE';
    toggleBtn.classList.add('active');
    chat.classList.add('visible');
    loadingEl.classList.remove('hidden');
    showModel('breathing');
    if (!messagesEl.children.length) {
      addBot('Вітаю. Я Osiris — твій AI-асистент. Чим можу допомогти?');
    }
    setTimeout(function() { inputEl.focus(); }, 400);
  }

  function deactivate() {
    chatActive = false;
    spinOn     = true;
    toggleBtn.innerHTML = '<span class="os-ind"></span>ACTIVATE';
    toggleBtn.classList.remove('active');
    chat.classList.remove('visible');
    showModel('base');
  }

  // ─── SEND ────────────────────────────────────────────────────────────────
  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) send();
  });

  function parseMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n(\d+\.\s)/g, '<br><b>$1</b>')
      .replace(/\n/g, '<br>');
  }

  function send() {
    var text = inputEl.value.trim();
    if (!text || isTyping) return;
    inputEl.value = '';
    isTyping = true;
    addUser(text);
    showModel('touch');
    var el = addBot('...', true);

    fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        source: 'site',
        phone: userId
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var reply = data.reply || 'Помилка відповіді.';
      el.innerHTML = parseMarkdown(reply);
      el.classList.remove('typing');
    })
    .catch(function() {
      el.textContent = "Помилка з'єднання. Спробуй ще раз.";
      el.classList.remove('typing');
    })
    .finally(function() {
      isTyping = false;
      showModel('breathing');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  function addUser(text) {
    var el = document.createElement('div');
    el.className = 'os-msg user'; el.textContent = text;
    messagesEl.appendChild(el); messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }
  function addBot(text, typing) {
    var el = document.createElement('div');
    el.className = 'os-msg bot' + (typing ? ' typing' : ''); el.textContent = text;
    messagesEl.appendChild(el); messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }
})();
</script>
